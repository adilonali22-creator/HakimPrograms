<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HakimApp Otopark</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .menu-box { background: #111; padding: 20px; border-radius: 20px; margin: 15px 0; border: 2px solid #333; }
        h1 { font-weight: 900; color: #fff; margin-bottom: 30px; }
        button, label { display: block; width: 100%; padding: 20px; font-size: 18px; font-weight: 900; border-radius: 15px; border: none; cursor: pointer; margin: 10px 0; user-select: none; }
        .btn-kayit { background: #28a745; color: #fff; }
        .btn-liste { background: #ffc107; color: #000; }
        .btn-cikis { background: #dc3545; color: #fff; }
        .btn-yasak { background: #6c757d; color: #fff; }
        .btn-temizle { background: #bd2130; color: #fff; }
        input { width: 90%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: none; text-transform: uppercase; text-align: center; font-weight: bold; font-size: 18px; }
        .search-input { width: 90%; padding: 12px; margin: 10px auto; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; font-size: 16px; display: block; }
        #aracListesi, #yasakliListesi { margin-top: 15px; background: #222; padding: 15px; border-radius: 10px; display: none; text-align: left; }
        .arac-item { padding: 8px 0; border-bottom: 1px solid #333; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }
        .flex-buttons { display: flex; gap: 10px; }
        .flex-buttons button { padding: 15px; font-size: 15px; }
    </style>
</head>
<body>

    <h1>🅿️ HAKIMAPP</h1>

    <div class="menu-box">
        <label for="kamera" class="btn-kayit">📸 OTOPARK GİRİŞ KAYIT</label>
        <input type="file" id="kamera" accept="image/*" capture="environment" style="display:none;" onchange="plakaOku(this)">
        <button class="btn-kayit" style="background:#17a2b8;" onclick="manuelGirisYap()">⌨️ ELLE GİRİŞ KAYDI YAP</button>
    </div>

    <div class="menu-box">
        <button class="btn-liste" onclick="toggleListe()">🚗 ARAÇLAR (KONTROL)</button>
        <div id="aracListesi">
            <input type="text" id="aracAra" class="search-input" placeholder="🔍 Araç Ara (Plaka Yazın)..." onkeyup="aracFiltrele()">
            <div id="listeIcerik"><p>Sistem Hazır...</p></div>
        </div>
    </div>

    <div class="menu-box">
        <input type="text" id="plaka" placeholder="PLAKA GİRİN">
        <button class="btn-cikis" onclick="cikisYap()">ÇIKIŞ YAP & HESAPLA</button>
    </div>

    <div class="menu-box">
        <div class="flex-buttons">
            <button class="btn-yasak" onclick="arabaYasakla()">🚫 ARABA YASAKLA</button>
            <button class="btn-temizle" onclick="tumArabalariSil()">🗑️ TÜM ARABALARI SİL</button>
        </div>
        <button class="btn-liste" style="background:#444; color:#fff; padding: 10px; font-size: 14px;" onclick="toggleYasakliListe()">🚫 Yasaklı Plakaları Göster</button>
        <div id="yasakliListesi"></div>
    </div>

    <script>
        const API_TOKEN = "7b62ff5677db55f09f46dfe58a9e81c36cd18e89";

        window.onload = function() {
            listeyiGuncelle();

        // Plaka formatını temizleme (Boşlukları ve özel karakterleri siler)
        function formatPlaka(str) {
            return str.toUpperCase().replace(/[^A-Z0-9]/g, "").trim();
        }

        // Orijinal Kamera Tetikleme ve API Entegrasyonu
        function plakaOku(input) {
            if (!input.files || input.files.length === 0) return;
            
            alert("Fotoğraf alındı, plaka çözümleniyor...");
            let file = input.files[0];
            let formData = new FormData();
            formData.append('upload', file);
            formData.append('regions', 'mk'); // Kuzey Makedonya bölgesi öncelikli

            fetch('https://api.platerecognizer.com/v1/plate-reader/', {
                method: 'POST',
                headers: {'Authorization': 'Token ' + API_TOKEN},
                body: formData
            })
            .then(res => {
                if (!res.ok) throw new Error("API yanıt vermedi.");
                return res.json();
            })
            .then(data => {
                if (data.results && data.results.length > 0) {
                    let p = formatPlaka(data.results[0].plate);
                    document.getElementById('plaka').value = p;
                    girisKaydet(p);
                } else { 
                    alert("Plaka net okunamadı. Lütfen kutuya elle yazarak giriş/çıkış yapın."); 
                }
            })
            .catch(err => {
                console.error(err);
                alert("Bağlantı veya API hatası oluştu! Lütfen elle işlem yapın.");
            });
        }

        function manuelGirisYap() {
            let p = formatPlaka(document.getElementById('plaka').value);
            if(!p) {
                alert("Lütfen önce geçerli bir plaka yazın!");
                return;
            }
            girisKaydet(p);
        }
